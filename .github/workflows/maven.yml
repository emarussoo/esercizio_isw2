name: Java CI with Maven

on:
  push:
    branches: [ "main" ]  # Trigger ad ogni commit (Punto 8)

jobs:
  build:
    runs-on: ubuntu-latest # Specifica la macchina virtuale (Punto 7)

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml